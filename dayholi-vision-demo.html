<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dayholi Vision - Immersive VR Experience Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1117 50%, #0a0a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flashGold {
            0% { box-shadow: 0 0 0 0 rgba(240, 214, 138, 0.6); }
            100% { box-shadow: 0 0 0 12px rgba(240, 214, 138, 0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        .slide-up {
            animation: slideUp 0.4s ease;
        }

        .flash-add {
            animation: flashGold 0.6s ease;
        }

        /* Navigation */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 26, 0.85);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #0a0a1a;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #f0d68a, #c9a040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 6px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 8px;
            background: transparent;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            position: relative;
        }

        .nav-btn.active {
            background: rgba(201, 160, 64, 0.15);
            color: #f0d68a;
        }

        .nav-btn.live::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-left: 6px;
            animation: pulse 1.5s infinite;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-icon-btn {
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: #888;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
        }

        .nav-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #0a0a1a;
        }

        /* Main content */
        .container {
            padding: 32px 32px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Hero section */
        .hero {
            border-radius: 20px;
            padding: 80px 60px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, rgba(201, 160, 64, 0.08) 0%, rgba(10, 10, 26, 0.95) 100%);
            border: 1px solid rgba(201, 160, 64, 0.12);
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #fff, #f0d68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 18px;
            color: #999;
            margin-bottom: 32px;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-primary {
            padding: 14px 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            color: #0a0a1a;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(201, 160, 64, 0.3);
            transition: all 0.2s;
            transform: translateY(0);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 32px rgba(201, 160, 64, 0.4);
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }

        .stat {
            text-align: left;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #f0d68a;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }

        /* Section headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-filter {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
        }

        .btn-filter.active {
            background: rgba(201, 160, 64, 0.2);
            color: #f0d68a;
            border: 1px solid rgba(201, 160, 64, 0.3);
        }

        /* Cards */
        .grid {
            display: grid;
            gap: 16px;
            margin-bottom: 40px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .card {
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: rgba(201, 160, 64, 0.2);
        }

        .card.selected {
            border: 2px solid #f0d68a;
            box-shadow: 0 0 20px rgba(201, 160, 64, 0.15);
            transform: scale(1.02);
        }

        .card-image {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.9);
            flex-direction: column;
            overflow: hidden;
        }

        .card-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: 1;
        }

        .card-image-icon {
            font-size: 36px;
            margin-bottom: 6px;
            position: relative;
            z-index: 2;
        }

        .card-image-label {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 0 8px;
            position: relative;
            z-index: 2;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .card-body {
            padding: 14px 16px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-nature {
            background: rgba(74, 222, 128, 0.13);
            color: #4ade80;
        }

        .badge-luxury {
            background: rgba(240, 214, 138, 0.13);
            color: #f0d68a;
        }

        .badge-animals {
            background: rgba(96, 165, 250, 0.13);
            color: #60a5fa;
        }

        /* Create flow */
        .steps-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .step-circle.active {
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            color: #0a0a1a;
            border: none;
        }

        .step-label {
            font-size: 14px;
            font-weight: 400;
            color: #666;
        }

        .step-label.active {
            font-weight: 600;
            color: #f0d68a;
        }

        .step-divider {
            color: #333;
            margin: 0 4px;
        }

        .section-content {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .section-desc {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .clip-card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .clip-card.added {
            border: 2px solid #f0d68a;
            opacity: 0.5;
        }

        .clip-card-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #f0d68a;
            color: #0a0a1a;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            z-index: 5;
        }

        .clip-card-label {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 500;
            color: #ccc;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .timeline-section {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .timeline-info {
            color: #666;
            font-weight: 400;
        }

        .btn-secondary {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255, 80, 80, 0.1);
            color: #ff6666;
            font-size: 12px;
            border: 1px solid rgba(255, 80, 80, 0.2);
            cursor: pointer;
        }

        .timeline-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0;
            min-height: 100px;
            align-items: center;
        }

        .timeline-empty {
            color: #444;
            font-size: 14px;
            padding: 20px 0;
            width: 100%;
            text-align: center;
        }

        .timeline-clip {
            min-width: 130px;
            height: 85px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            border: 2px solid rgba(201, 160, 64, 0.3);
        }

        .timeline-clip-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 4px 8px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            font-size: 10px;
            font-weight: 500;
            color: #fff;
        }

        .timeline-clip-duration {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            font-size: 9px;
            color: #f0d68a;
            font-weight: 600;
            z-index: 3;
        }

        .timeline-clip-remove {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.8);
            color: #fff;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            line-height: 1;
            z-index: 4;
        }

        .timeline-add {
            min-width: 100px;
            height: 85px;
            border-radius: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 28px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            gap: 12px;
        }

        .btn-back {
            padding: 12px 24px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .btn-next {
            padding: 14px 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            color: #0a0a1a;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(201, 160, 64, 0.3);
        }

        .btn-next.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Customize view */
        .customize-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        .customize-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .customize-sidebar {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .section-box {
            padding: 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .section-box-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 14px;
        }

        .music-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
        }

        .music-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: all 0.2s;
        }

        .music-item.selected {
            background: rgba(201, 160, 64, 0.1);
            border: 1px solid rgba(201, 160, 64, 0.2);
        }

        .music-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(201, 160, 64, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #f0d68a;
            flex-shrink: 0;
        }

        .music-info {
            flex: 1;
            min-width: 0;
        }

        .music-name {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 11px;
            color: #666;
        }

        .music-meta {
            font-size: 11px;
            color: #555;
            flex-shrink: 0;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #c9a040;
            cursor: pointer;
        }

        .content-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .content-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: all 0.2s;
        }

        .content-item.selected {
            background: rgba(201, 160, 64, 0.1);
            border: 1px solid rgba(201, 160, 64, 0.25);
        }

        .content-icon {
            font-size: 22px;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }

        .content-text {
            flex: 1;
        }

        .content-title {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
        }

        .content-desc {
            font-size: 11px;
            color: #666;
        }

        .frequency-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 14px;
        }

        .btn-frequency {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            color: #666;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-frequency.active {
            background: rgba(130, 90, 255, 0.15);
            color: #b090ff;
            border: 1px solid rgba(130, 90, 255, 0.25);
        }

        .duration-grid {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-duration {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-duration.active {
            background: rgba(201, 160, 64, 0.2);
            color: #f0d68a;
            border: 1px solid rgba(201, 160, 64, 0.3);
        }

        .section-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        .summary-section {
            display: flex;
            flex-direction: column;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 13px;
        }

        .summary-label {
            color: #666;
        }

        .summary-value {
            color: #fff;
            font-weight: 500;
        }

        .btn-preview {
            padding: 12px 24px;
            border-radius: 10px;
            background: linear-gradient(135deg, #c9a040, #f0d68a);
            color: #0a0a1a;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 20px rgba(201, 160, 64, 0.2);
        }

        .btn-full {
            width: 100%;
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        /* Preview */
        .preview-container {
            text-align: center;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .preview-description {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .preview-video {
            max-width: 900px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(201, 160, 64, 0.15);
        }

        .preview-video-content {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            transition: background 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .preview-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .preview-overlay-badge {
            padding: 4px 12px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            font-size: 12px;
            color: #f0d68a;
            font-weight: 500;
            width: fit-content;
        }

        .preview-overlay-title {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);

        function updatePreviewUI() {
            // Lightweight update — only touches the elements that change, no full re-render
            const progBar = document.getElementById('prog-bar');
            const currTime = document.getElementById('curr-time');
            const playIcon = document.getElementById('play-icon');
            const prevContent = document.getElementById('prev-content');
            const prevClip = document.getElementById('prev-clip');
            if (!progBar) return;
            progBar.style.width = state.previewProgress + '%';
            const ct = Math.floor(state.previewProgress / 100 * state.selectedDuration * 60);
            currTime.textContent = '0:' + String(ct).padStart(2, '0');
            playIcon.textContent = state.previewPlaying ? '⏸' : '▶';
            if (state.timelineClips.length > 0 && prevContent) {
                const clip = state.timelineClips[state.previewClipIdx % state.timelineClips.length];
                prevContent.style.background = CLIP_GRADIENTS[clip.id];
                prevContent.textContent = clip.icon;
                if (prevClip) prevClip.textContent = clip.name;
            }

        function runPreview() {
            if (previewTimer) clearInterval(previewTimer);

                if (state.timelineClips.length > 0) {
                    const seg = 100 / state.timelineClips.length;

                    item.onclick = () => { state.selectedContent = ct.id; render(); };
                    item.innerHTML = `<div class="content-icon">${ct.icon}</div><div class="content-text"><div class="content-title">${ct.name}</div><div class="content-desc">${ct.desc}</div></div>`;
                    co.appendChild(item);
                });

                document.getElementById('freq-container').style.display = state.selectedContent === 'frequency' ? 'block' : 'none';
                const fg = document.getElementById('freq-grid');
                fg.innerHTML = '';
                FREQUENCIES.forEach(f => {
                    const b = document.createElement('button');
                    b.className = 'btn-frequency' + (state.selectedFreq === f ? ' active' : '');
                    b.textContent = f;
                    b.onclick = () => { state.selectedFreq = f; render(); };
                    fg.appendChild(b);
                });

                document.getElementById('content-vol-container').style.display = ['meditation','spiritual','travel'].includes(state.selectedContent) ? 'block' : 'none';
                document.getElementById('content-vol').value = state.contentVolume;
                document.getElementById('content-vol-display').textContent = state.contentVolume + '%';

                const dg = document.getElementById('duration-grid');
                DURATIONS.forEach(d => {
                    const b = document.createElement('button');
                    b.className = 'btn-duration' + (state.selectedDuration === d ? ' active' : '');
                    b.textContent = d + 'm';
                    b.onclick = () => { state.selectedDuration = d; render(); };
                    dg.appendChild(b);
                });

                const ls = document.getElementById('lang-select');
                LANGUAGES.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l;
                    opt.textContent = l;
                    if (l === state.selectedLang) opt.selected = true;
                    ls.appendChild(opt);
                });

                const sum = document.getElementById('summary');
                const items = [['Scenes', `${state.timelineClips.length} clips`],['Scene Time', `${tt}s raw`],['Duration', `${state.selectedDuration} min`],['Music', state.selectedMusic ? MUSIC_TRACKS.find(m => m.id === state.selectedMusic).name : 'None'],['Content', CONTENT_TYPES.find(c => c.id === state.selectedContent).name]];
                if (state.selectedContent === 'frequency') items.push(['Frequency', state.selectedFreq]);
                items.push(['Language', state.selectedLang]);
                items.forEach(([k, v]) => {
                    const item = document.createElement('div');
                    item.className = 'summary-item';
                    item.innerHTML = `<span class="summary-label">${k}</span><span class="summary-value">${v}</span>`;
                    sum.appendChild(item);
                });
            }

            const step2 = document.createElement('div');
            step2.id = 'step2';
            step2.style.display = state.createStep === 2 ? 'block' : 'none';
            step2.className = 'preview-container slide-up';
            step2.innerHTML = `
                <div class="preview-title">Your Experience is Ready</div>
                <p class="preview-description">Preview your creation, then save it to your library.</p>
                <div class="preview-video" id="prev-video">
                    <div class="preview-video-content" id="prev-content"></div>
                    <div class="preview-overlay">
                        <div class="preview-overlay-badge" id="prev-badge"></div>
                        <div class="preview-overlay-title" id="prev-clip"></div>
                    </div>
                    <div class="preview-top-left">360° 8K</div>
                    <div class="preview-top-right" id="prev-music"></div>
                </div>
                <div class="playback-bar">
                    <button class="play-button" onclick="togglePlay()"><span id="play-icon">▶</span></button>
                    <div class="time-display" id="curr-time">0:00</div>
                    <div class="progress-bar-container" onclick="seekPrev(event)"><div class="progress-bar-fill" id="prog-bar" style="width: 0%"></div></div>
                    <div class="time-display" id="tot-time">0:00</div>
                </div>
                <div class="preview-buttons">
                    <button class="btn-save" onclick="showSaveModal()">💾 Save to Library</button>
                    <button class="btn-edit" onclick="prevStep()">← Edit</button>
                    <button class="btn-edit">📤 Share</button>
                </div>
            `;
            page.appendChild(step2);

            if (state.createStep === 2) {
                const pc = document.getElementById('prev-content');
                if (state.timelineClips.length > 0) {
                    const clip = state.timelineClips[state.previewClipIdx % state.timelineClips.length];
                    pc.style.background = CLIP_GRADIENTS[clip.id];
                    pc.textContent = clip.icon;
                }
                if (state.selectedContent !== 'none') {
                    document.getElementById('prev-badge').style.display = 'block';
                    let txt = CONTENT_TYPES.find(c => c.id === state.selectedContent).name;
                    if (state.selectedContent === 'frequency') txt += ' · ' + state.selectedFreq;
                    document.getElementById('prev-badge').textContent = txt;
                } else {
                    document.getElementById('prev-badge').style.display = 'none';
                }
                if (state.timelineClips.length > 0) {
                    document.getElementById('prev-clip').textContent = state.timelineClips[state.previewClipIdx % state.timelineClips.length].name;
                }
                const pm = document.getElementById('prev-music');
                if (state.selectedMusic) {
                    const track = MUSIC_TRACKS.find(m => m.id === state.selectedMusic);
                    pm.innerHTML = `<span>🎵</span><span class="preview-top-right-text">${track.name}</span>`;
                } else {
                    pm.innerHTML = '';
                }
                document.getElementById('play-icon').textContent = state.previewPlaying ? '⏸' : '▶';
                const ct = Math.floor(state.previewProgress / 100 * state.selectedDuration * 60);
                document.getElementById('curr-time').textContent = '0:' + String(ct).padStart(2, '0');
                document.getElementById('tot-time').textContent = state.selectedDuration + ':00';
                document.getElementById('prog-bar').style.width = state.previewProgress + '%';
            }
        }

        function renderLibrary() {
            const page = document.getElementById('library-page');
            page.innerHTML = `
                <div class="library-header">
                    <div><div class="library-title">My Library</div><p class="library-desc">Your saved experiences and favorites</p></div>
                    <button class="btn-primary" onclick="setScreen('create')">+ Create New</button>
                </div>
                <div class="library-filters">
                    <button class="btn-filter active">All</button>
                    <button class="btn-filter">Recent</button>
                    <button class="btn-filter">Favorites</button>
                </div>
                <div class="grid grid-3" id="lib-items"></div>
            `;
            const li = document.getElementById('lib-items');
            SAVED_EXPERIENCES.forEach(exp => {
                const card = document.createElement('div');
                card.className = 'experience-card';
                card.innerHTML = `
                    <div class="experience-card-header" style="background: ${exp.gradient};">
                        ${exp.fav ? '<div class="experience-card-heart">❤️</div>' : ''}
                        <div class="card-absolute-top-left">360° 8K</div>
                    </div>
                    <div class="experience-card-body">
                        <div class="experience-card-title-row">
                            <div class="experience-info">
                                <div class="experience-title">${exp.name}</div>
                                <div class="experience-meta">${exp.clips} clips · ${exp.duration} · ${exp.date}</div>
                            </div>
                            <div class="experience-actions">
                                <button class="btn-action">✏️</button>
                                <button class="btn-action">📤</button>
                                <button class="btn-action">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
                li.appendChild(card);
            });
        }

        function renderLive() {
            const page = document.getElementById('live-page');
            page.innerHTML = `
                <div class="live-header"><div class="live-title">🔴 Live Experiences</div><p class="live-desc">Join live 360° streams from artists, nature cams, and cities</p></div>
                <div class="live-filters" id="live-filt"></div>
                <div class="grid grid-3" id="live-items"></div>
            `;
            const lf = document.getElementById('live-filt');
            [['all','All'],['artist','Music Artists'],['nature','Nature'],['city','Cities']].forEach(([k,v]) => {
                const b = document.createElement('button');
                b.className = 'btn-filter' + (state.liveFilter === k ? ' active' : '');
                b.textContent = v;
                b.onclick = () => { state.liveFilter = k; render(); };
                lf.appendChild(b);
            });
            const li = document.getElementById('live-items');
            getLive().forEach(s => {
                const card = document.createElement('div');
                card.className = 'live-card';
                card.innerHTML = `
                    <div class="live-card-image" style="background: ${LIVE_GRADIENTS[s.id]}; color: rgba(255,255,255,0.9); font-size: 36px; display: flex; align-items: center; justify-content: center;">
                        ${s.icon}
                        <div class="live-badge-top-left"><span class="live-indicator"></span> LIVE</div>
                        <div class="live-badge-top-right">👁 ${s.viewers.toLocaleString()}</div>
                        <div class="live-card-overlay">
                            <div class="live-card-title">${s.title}</div>
                            <div class="live-card-name">${s.name}</div>
                        </div>
                    </div>
                    <div class="live-card-footer">
                        <span class="live-type-badge live-type-${s.type}">${s.type}</span>
                        <button class="btn-join">Join Stream</button>
                    </div>
                `;
                li.appendChild(card);
            });
        }

        updateNav();
        render();
    </script>
</body>
</html>
